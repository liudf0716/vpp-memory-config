<!DOCTYPE html>
<html>

<title>Taalas 封面</title>
<style>

  font-family: "Arial", sans-serif;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;

  color: #ff3c3c;
}
</style>
</head>
<body>
  <div class="container">
    <div class="title">算力市场要变天？</div>

    </div>

</html>
